version: "3.9"

services:
  # ==============================
  # Backend (FastAPI + Gunicorn)
  # ==============================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENVIRONMENT=production
      - DEBUG=false
      - CORS_ORIGINS=${CORS_ORIGINS}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network
      - proxy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    labels:
      - "traefik.enable=true"
      # --- 認証エンドポイント (レート制限: 3r/s) ---
      - "traefik.http.routers.helper5-auth.rule=Host(`h.kokoro-shift.jp`) && PathPrefix(`/api/v1/auth/`)"
      - "traefik.http.routers.helper5-auth.entrypoints=websecure"
      - "traefik.http.routers.helper5-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.helper5-auth.priority=30"
      - "traefik.http.routers.helper5-auth.middlewares=rate-limit-auth@file,security-headers@file,gzip-compress@file,request-body-limit@file"
      - "traefik.http.routers.helper5-auth.service=helper5-backend"
      # --- APIエンドポイント (レート制限: 10r/s) ---
      - "traefik.http.routers.helper5-api.rule=Host(`h.kokoro-shift.jp`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.helper5-api.entrypoints=websecure"
      - "traefik.http.routers.helper5-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.helper5-api.priority=20"
      - "traefik.http.routers.helper5-api.middlewares=rate-limit-api@file,security-headers@file,gzip-compress@file,request-body-limit@file"
      - "traefik.http.routers.helper5-api.service=helper5-backend"
      # --- WebSocket ---
      - "traefik.http.routers.helper5-ws.rule=Host(`h.kokoro-shift.jp`) && PathPrefix(`/ws/`)"
      - "traefik.http.routers.helper5-ws.entrypoints=websecure"
      - "traefik.http.routers.helper5-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.helper5-ws.priority=20"
      - "traefik.http.routers.helper5-ws.middlewares=security-headers@file"
      - "traefik.http.routers.helper5-ws.service=helper5-backend"
      # --- バックエンドサービス定義 ---
      - "traefik.http.services.helper5-backend.loadbalancer.server.port=8000"

  # ==============================
  # Frontend (Nginx + 静的ファイル)
  # ==============================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: "/api/v1"
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - app_network
      - proxy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    labels:
      - "traefik.enable=true"
      # --- フロントエンド (catch-all, 最低優先度) ---
      - "traefik.http.routers.helper5-frontend.rule=Host(`h.kokoro-shift.jp`)"
      - "traefik.http.routers.helper5-frontend.entrypoints=websecure"
      - "traefik.http.routers.helper5-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.helper5-frontend.priority=10"
      - "traefik.http.routers.helper5-frontend.middlewares=security-headers@file,gzip-compress@file"
      - "traefik.http.routers.helper5-frontend.service=helper5-frontend"
      - "traefik.http.services.helper5-frontend.loadbalancer.server.port=3000"

  # ==============================
  # PostgreSQL データベース
  # ==============================
  db:
    image: postgres:15-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "shared_buffers=256MB", "-c", "max_connections=100", "-c", "work_mem=4MB", "-c", "effective_cache_size=1GB", "-c", "maintenance_work_mem=64MB"]
    restart: unless-stopped
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # Redis キャッシュ
  # ==============================
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge
  proxy:
    external: true
